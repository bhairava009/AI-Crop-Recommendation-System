{% extends 'base.html' %}

{% block title %}Admin Login | SmartCrop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 bg-gray-900 text-white p-8 rounded-xl shadow-lg border border-gray-700">
    <div class="text-center mb-8">
        <svg class="w-12 h-12 mx-auto text-blue-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
        </svg>
        <h2 class="text-3xl font-bold text-blue-400">Admin Portal</h2>
        <p class="text-gray-400 mt-2">Restricted Access</p>
    </div>
    
    <form action="{{ url_for('admin_login') }}" method="POST" class="space-y-6">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-300 mb-1">Admin Username</label>
            <input type="text" id="username" name="username" required 
                class="w-full px-4 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
        </div>
        
        <div>
            <label for="password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
            <input type="password" id="password" name="password" required 
                class="w-full px-4 py-2 bg-gray-800 border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:outline-none transition">
        </div>
        
        <button type="submit" class="w-full py-3 bg-blue-600 text-white font-bold rounded-lg hover:bg-blue-700 transition transform hover:-translate-y-0.5">
            Authenticate
        </button>
    </form>
    
    <div class="mt-8 pt-6 border-t border-gray-700 text-center">
        <a href="{{ url_for('login') }}" class="text-sm text-gray-400 hover:text-white transition">Return to User Login</a>
    </div>
</div>
{% endblock %}
