{% extends 'base.html' %}

{% block title %}Login | SmartCrop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <h2 class="text-3xl font-bold text-center text-agri-green mb-8">Welcome Back</h2>

    <form action="{{ url_for('login') }}" method="POST" class="space-y-6">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
            <input type="text" id="username" name="username" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
        </div>

        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" id="password" name="password" required
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
        </div>

        <button type="submit"
            class="w-full py-3 bg-agri-green text-white font-bold rounded-lg hover:bg-green-700 transition transform hover:-translate-y-0.5">
            Login
        </button>
    </form>

    <p class="text-center mt-6 text-gray-600">
        Don't have an account? <a href="{{ url_for('signup') }}"
            class="text-agri-green font-semibold hover:underline">Sign up</a>
    </p>
</div>
{% endblock %}
