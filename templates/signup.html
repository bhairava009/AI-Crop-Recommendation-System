{% extends 'base.html' %}

{% block title %}Sign Up | SmartCrop{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-16 bg-white p-8 rounded-xl shadow-lg border border-gray-100">
    <h2 class="text-3xl font-bold text-center text-agri-green mb-8">Create Account</h2>
    
    <form action="{{ url_for('signup') }}" method="POST" class="space-y-6">
        <div>
            <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Choose a Username</label>
            <input type="text" id="username" name="username" required 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
        </div>
        
        <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Create a Password</label>
            <input type="password" id="password" name="password" required 
                class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:outline-none transition">
        </div>
        
        <button type="submit" class="w-full py-3 bg-agri-green text-white font-bold rounded-lg hover:bg-green-700 transition transform hover:-translate-y-0.5">
            Sign Up
        </button>
    </form>
    
    <p class="text-center mt-6 text-gray-600">
        Already have an account? <a href="{{ url_for('login') }}" class="text-agri-green font-semibold hover:underline">Login here</a>
    </p>
</div>
{% endblock %}
